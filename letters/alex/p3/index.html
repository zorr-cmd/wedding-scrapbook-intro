<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Photos · Alex to Nepal · Page 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #ecead9;
    color: #0d0d0d;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 8.5in;
    height: 11in;
    background: #f5f1ea;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
    padding: 0.5in 0.5in 0.45in 0.5in;
  }

  /* ===== TOP BAR ===== */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 0.5px solid #0d0d0d;
    padding-bottom: 0.08in;
    margin-bottom: 0.16in;
  }
  .top .brand {
    font-family: 'Inter', sans-serif;
    font-size: 7pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .top .brand .dot { color: #d4a056; margin: 0 0.5em; }
  .top .pgmeta {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #0d0d0d;
    font-weight: 400;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 0.18in;
  }
  .header .lhs .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
    color: #0d0d0d;
    margin-bottom: 0.05in;
  }
  .header .lhs .eyebrow .ochre { color: #d4a056; margin: 0 0.45em; }
  .header .lhs .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22pt;
    line-height: 1;
    letter-spacing: -0.005em;
    color: #0d0d0d;
  }
  .header .lhs .title .accent { color: #d4a056; }
  .header .rhs {
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 6.2pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #1a1a1a;
    font-weight: 500;
    line-height: 1.7;
  }
  .header .rhs .o { color: #d4a056; margin: 0 0.45em; }

  /* ===== GRID — 3 cols x 5 rows, no captions, tight contact-sheet gap ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 0.11in;
    height: 8.95in;
  }
  .cell {
    position: relative;
    overflow: hidden;
    background: #f5f1ea;
  }
  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.03) saturate(0.92);
  }

  /* object-position tuning per cell — center most, lift faces where needed */
  .c01 img { object-position: center 50%; }
  .c02 img { object-position: center 40%; }
  .c03 img { object-position: center 45%; }
  .c04 img { object-position: center 50%; }
  .c05 img { object-position: center 45%; }
  .c06 img { object-position: center 40%; }
  .c07 img { object-position: center 25%; }   /* lift to keep both faces visible */
  .c08 img { object-position: center 50%; }
  .c09 img { object-position: center 45%; }
  .c10 img { object-position: center 50%; }
  .c11 img { object-position: center 35%; }   /* close-up — bias upward to keep eyes */
  .c12 img { object-position: center 50%; }
  .c13 img { object-position: center 50%; }
  .c14 img { object-position: center 40%; }
  .c15 img { object-position: center 50%; }

  /* ===== FOOTER ===== */
  .foot {
    position: absolute;
    left: 0.5in;
    right: 0.5in;
    bottom: 0.22in;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Inter', sans-serif;
    font-size: 5.8pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #4a4a4a;
    font-weight: 500;
  }
  .foot .o { color: #d4a056; margin: 0 0.45em; }
  .foot .fin {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 9pt;
    letter-spacing: 0.02em;
    text-transform: none;
    color: #1a1a1a;
  }

</style>
</head>
<body>
  <div class="page">

    <div class="top">
      <div class="brand">ALEX<span class="dot">·</span>FOR NEPAL<span class="dot">·</span>PHOTOS</div>
      <div class="pgmeta">Pg. 03 / 03</div>
    </div>

    <div class="header">
      <div class="lhs">
        <div class="eyebrow">A Memory Wall<span class="ochre">·</span>Fifteen Frames</div>
        <div class="title">Always<span class="accent">.</span></div>
      </div>
      <div class="rhs">
        Selected By Alex<span class="o">·</span>2014&ndash;2026<br>
        End Of Set<span class="o">·</span>Pg. 03 / 03
      </div>
    </div>

    <section class="grid">
      <!-- Row 1 -->
      <figure class="cell c01"><img src="../photos/img-26-01.jpg" alt=""></figure>
      <figure class="cell c02"><img src="../photos/img-26-02.jpg" alt=""></figure>
      <figure class="cell c03"><img src="../photos/img-26-03.jpg" alt=""></figure>

      <!-- Row 2 -->
      <figure class="cell c04"><img src="../photos/img-26-04.jpg" alt=""></figure>
      <figure class="cell c05"><img src="../photos/img-26-05.jpg" alt=""></figure>
      <figure class="cell c06"><img src="../photos/img-26-06.jpg" alt=""></figure>

      <!-- Row 3 -->
      <figure class="cell c07"><img src="../photos/img-26-07.jpg" alt=""></figure>
      <figure class="cell c08"><img src="../photos/img-26-08.jpg" alt=""></figure>
      <figure class="cell c09"><img src="../photos/img-26-09.jpg" alt=""></figure>

      <!-- Row 4 -->
      <figure class="cell c10"><img src="../photos/img-26-10.jpg" alt=""></figure>
      <figure class="cell c11"><img src="../photos/img-26-11.jpg" alt=""></figure>
      <figure class="cell c12"><img src="../photos/img-26-12.jpg" alt=""></figure>

      <!-- Row 5 -->
      <figure class="cell c13"><img src="../photos/img-26-13.jpg" alt=""></figure>
      <figure class="cell c14"><img src="../photos/img-26-14.jpg" alt=""></figure>
      <figure class="cell c15"><img src="../photos/img-26-15.jpg" alt=""></figure>
    </section>

    <div class="foot">
      <div>Alex<span class="o">·</span>For Nepal<span class="o">·</span>Three Pages, One Brotherhood</div>
      <div class="fin"><em>Fifteen frames, one Alex.</em></div>
    </div>

  </div>
</body>
</html>
