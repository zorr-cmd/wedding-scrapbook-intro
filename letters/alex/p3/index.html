<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Photos · Alex to Nepal · Page 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #ecead9;
    color: #0d0d0d;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 8.5in;
    height: 11in;
    background: #f5f1ea;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
    padding: 0.55in 0.55in 0.5in 0.55in;
  }

  /* ===== TOP BAR ===== */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 0.5px solid #0d0d0d;
    padding-bottom: 0.08in;
    margin-bottom: 0.22in;
  }
  .top .brand {
    font-family: 'Inter', sans-serif;
    font-size: 7pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .top .brand .dot { color: #d4a056; margin: 0 0.5em; }
  .top .pgmeta {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #0d0d0d;
    font-weight: 400;
  }

  /* ===== Editorial header strip ===== */
  .strip {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.2in;
  }
  .strip .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
    color: #0d0d0d;
  }
  .strip .eyebrow .ochre { color: #d4a056; margin: 0 0.45em; }
  .strip .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18pt;
    line-height: 1;
    letter-spacing: -0.005em;
    color: #0d0d0d;
  }
  .strip .title .accent { color: #d4a056; }
  .strip .meta {
    font-family: 'Inter', sans-serif;
    font-size: 6pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #1a1a1a;
    font-weight: 500;
    text-align: right;
  }
  .strip .meta .o { color: #d4a056; margin: 0 0.45em; }

  /* ===== GRID: 2 cols x 2 rows, with top-right photo spanning two rows ===== */
  .grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 0.18in;
    height: 9.05in;
  }
  .cell {
    position: relative;
    overflow: hidden;
    background: #f5f1ea;
  }
  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.03) saturate(0.92);
  }

  .c1 { grid-column: 1 / 2; grid-row: 1 / 2; }
  .c2 { grid-column: 2 / 3; grid-row: 1 / 3; }
  .c3 { grid-column: 1 / 2; grid-row: 2 / 3; }

  .c1 img { object-position: center 40%; }
  .c2 img { object-position: center 40%; }
  .c3 img { object-position: center 30%; }

  /* tiny plate labels in corner */
  .plate {
    position: absolute;
    left: 0.1in;
    bottom: 0.08in;
    font-family: 'Inter', sans-serif;
    font-size: 5.8pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    color: #f5f1ea;
    text-shadow: 0 0 6px rgba(0,0,0,0.45);
  }
  .plate .pn {
    color: #d4a056;
    margin-right: 0.4em;
  }

  /* footer rule */
  .foot {
    margin-top: 0.2in;
    padding-top: 0.08in;
    border-top: 0.5px solid rgba(13,13,13,0.18);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Inter', sans-serif;
    font-size: 5.8pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #4a4a4a;
    font-weight: 500;
  }
  .foot .o { color: #d4a056; margin: 0 0.45em; }

</style>
</head>
<body>
  <div class="page">

    <div class="top">
      <div class="brand">ALEX<span class="dot">·</span>FOR NEPAL<span class="dot">·</span>PHOTOS</div>
      <div class="pgmeta">Pg. 03 / 03</div>
    </div>

    <div class="strip">
      <div class="eyebrow">Closing Plates<span class="ochre">·</span>No Captions</div>
      <div class="title">Three<span class="accent">.</span></div>
      <div class="meta">End Of Set<span class="o">·</span>Pg. 03 / 03</div>
    </div>

    <section class="grid">
      <figure class="cell c1">
        <img src="../photos/img-28.jpg" alt="">
        <div class="plate"><span class="pn">15</span>Disneyland</div>
      </figure>
      <figure class="cell c2">
        <img src="../photos/img-27.jpg" alt="">
        <div class="plate"><span class="pn">16</span>Chinatown At Night</div>
      </figure>
      <figure class="cell c3">
        <img src="../photos/img-29.jpg" alt="">
        <div class="plate"><span class="pn">17</span>Mirror Selfie</div>
      </figure>
    </section>

    <div class="foot">
      <div>Alex<span class="o">·</span>For Nepal<span class="o">·</span>Three Pages, One Brotherhood</div>
      <div>Fin.</div>
    </div>

  </div>
</body>
</html>
