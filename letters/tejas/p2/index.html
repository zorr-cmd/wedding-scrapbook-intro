<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Photos · Tejas to Nepal · Page 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #ecead9;
    color: #0d0d0d;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 8.5in;
    height: 11in;
    background: #f5f1ea;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
    padding: 0.5in 0.5in 0.45in 0.5in;
  }

  /* ===== TOP BAR ===== */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 0.5px solid #0d0d0d;
    padding-bottom: 0.08in;
    margin-bottom: 0.16in;
  }
  .top .brand {
    font-family: 'Inter', sans-serif;
    font-size: 7pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .top .brand .dot { color: #d4a056; margin: 0 0.5em; }
  .top .pgmeta {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #0d0d0d;
    font-weight: 400;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 0.18in;
  }
  .header .lhs .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
    color: #0d0d0d;
    margin-bottom: 0.05in;
  }
  .header .lhs .eyebrow .ochre { color: #d4a056; margin: 0 0.45em; }
  .header .lhs .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22pt;
    line-height: 1;
    letter-spacing: -0.005em;
    color: #0d0d0d;
  }
  .header .lhs .title .accent { color: #d4a056; }
  .header .rhs {
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 6.2pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #1a1a1a;
    font-weight: 500;
    line-height: 1.7;
  }
  .header .rhs .o { color: #d4a056; margin: 0 0.45em; }

  /* ===== ASYMMETRIC GRID — 3 cols x 3 rows, hero spans 2 cols ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 2.75in 2.7in 2.7in;
    gap: 0.12in;
    height: 8.39in;
  }
  .cell {
    position: relative;
    overflow: hidden;
    background: #f5f1ea;
  }
  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.03) saturate(0.92);
  }
  /* subtle bottom scrim so small white plate labels stay legible on light photos */
  .cell::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 0.55in;
    background: linear-gradient(to top, rgba(0,0,0,0.42), rgba(0,0,0,0));
    pointer-events: none;
  }

  /* placements */
  .c1 { grid-column: 1 / 3; grid-row: 1 / 2; }   /* HERO: Bailey Cove / Shasta */
  .c2 { grid-column: 3 / 4; grid-row: 1 / 2; }   /* tall right: chai/tea */
  .c3 { grid-column: 1 / 2; grid-row: 2 / 3; }   /* sunset boat selfie */
  .c4 { grid-column: 2 / 3; grid-row: 2 / 3; }   /* vintage car */
  .c5 { grid-column: 3 / 4; grid-row: 2 / 3; }   /* nepal + cat */
  .c6 { grid-column: 1 / 2; grid-row: 3 / 4; }   /* dinner group */
  .c7 { grid-column: 2 / 3; grid-row: 3 / 4; }   /* nepal in car */
  .c8 { grid-column: 3 / 4; grid-row: 3 / 4; }   /* airport selfie */

  /* object-position tuning */
  .c1 img { object-position: center 50%; }   /* Bailey Cove sign — keep sign + group visible */
  .c2 img { object-position: center 50%; }   /* chai — table center */
  .c3 img { object-position: center 35%; }   /* sunset — keep faces high */
  .c4 img { object-position: center 18%; }   /* car prop — tight on faces, lose foreground */
  .c5 img { object-position: center 40%; }   /* nepal + cat — keep nepal */
  .c6 img { object-position: center 55%; }   /* dinner — table in lower half */
  .c7 img { object-position: center 40%; }   /* nepal in car — face high */
  .c8 img { object-position: center 50%; }   /* airport selfie */

  /* tiny plate labels in corner — sits on top of the scrim */
  .plate {
    position: absolute;
    left: 0.1in;
    bottom: 0.08in;
    z-index: 2;
    font-family: 'Inter', sans-serif;
    font-size: 5.6pt;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    font-weight: 600;
    color: #f5f1ea;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
  }
  .plate .pn {
    color: #d4a056;
    margin-right: 0.4em;
  }

  /* ===== FOOTER ===== */
  .foot {
    position: absolute;
    left: 0.5in;
    right: 0.5in;
    bottom: 0.22in;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Inter', sans-serif;
    font-size: 5.8pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #4a4a4a;
    font-weight: 500;
  }
  .foot .o { color: #d4a056; margin: 0 0.45em; }
  .foot .fin {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 9pt;
    letter-spacing: 0.02em;
    text-transform: none;
    color: #1a1a1a;
  }

</style>
</head>
<body>
  <div class="page">

    <div class="top">
      <div class="brand">TEJAS<span class="dot">·</span>FOR NEPAL<span class="dot">·</span>PHOTOS</div>
      <div class="pgmeta">Pg. 02 / 02</div>
    </div>

    <div class="header">
      <div class="lhs">
        <div class="eyebrow">A Plate Selection<span class="ochre">·</span>Eight Frames</div>
        <div class="title">Adventures<span class="accent">.</span></div>
      </div>
      <div class="rhs">
        Selected By Tejas<span class="o">·</span>Years Of It<br>
        End Of Set<span class="o">·</span>Pg. 02 / 02
      </div>
    </div>

    <section class="grid">
      <figure class="cell c1">
        <img src="../photos/img-02.jpg" alt="">
        <div class="plate"><span class="pn">01</span>Bailey Cove&nbsp;·&nbsp;Shasta-Trinity</div>
      </figure>
      <figure class="cell c2">
        <img src="../photos/img-03.jpg" alt="">
        <div class="plate"><span class="pn">02</span>Chai &amp; Conversation</div>
      </figure>
      <figure class="cell c3">
        <img src="../photos/img-04.jpg" alt="">
        <div class="plate"><span class="pn">03</span>Golden Hour</div>
      </figure>
      <figure class="cell c4">
        <img src="../photos/img-05.jpg" alt="">
        <div class="plate"><span class="pn">04</span>The Boys, Abroad</div>
      </figure>
      <figure class="cell c5">
        <img src="../photos/img-06.jpg" alt="">
        <div class="plate"><span class="pn">05</span>Nepal &amp; A Friend</div>
      </figure>
      <figure class="cell c6">
        <img src="../photos/img-01.jpg" alt="">
        <div class="plate"><span class="pn">06</span>Round The Table</div>
      </figure>
      <figure class="cell c7">
        <img src="../photos/img-08.jpg" alt="">
        <div class="plate"><span class="pn">07</span>On The Road</div>
      </figure>
      <figure class="cell c8">
        <img src="../photos/img-09.jpg" alt="">
        <div class="plate"><span class="pn">08</span>Terminal</div>
      </figure>
    </section>

    <div class="foot">
      <div>Tejas<span class="o">·</span>For Nepal<span class="o">·</span>Two Pages, One Brotherhood</div>
      <div class="fin"><em>From the SD boys, with love.</em></div>
    </div>

  </div>
</body>
</html>
